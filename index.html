<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBA 藝術週邊平台</title>
    <style>
        :root {
            --ant-primary: #1677ff;
            --ant-bg-layout: #f5f5f5;
            --ant-bg-container: #ffffff;
            --ant-text-primary: rgba(0, 0, 0, 0.88);
            --ant-text-secondary: rgba(0, 0, 0, 0.45);
        }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--ant-bg-layout);
            color: var(--ant-text-primary);
        }
        header {
            background: var(--ant-bg-container);
            padding: 0 5%;
            height: 64px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .hero {
            padding: 80px 20px;
            text-align: center;
        }
        .btn-primary {
            background: var(--ant-primary);
            color: white;
            padding: 8px 24px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold; font-size: 20px;">TBA ART</div>
    </header>
    <section class="hero">
        <h1>讓藝術走入生活</h1>
        <p>探索專屬於您的藝術週邊，讓每一天都充滿靈感。</p>
        <a href="#" class="btn-primary">開始探索</a>
    </section>
</body>
</html>
